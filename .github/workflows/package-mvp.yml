name: Package MVP

on:
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Create/upload GitHub Release with APK/AAB assets"
        required: false
        default: false
        type: boolean
  push:
    branches:
      - main
      - master
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      HAS_SIGNING_SECRETS: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' && secrets.ANDROID_KEYSTORE_PASSWORD != '' && secrets.ANDROID_KEY_ALIAS != '' && secrets.ANDROID_KEY_PASSWORD != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Build MVP examples
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/bin

          g++ -std=c++17 -O2 -I. \
            src/config/config_runtime.cpp \
            src/config/runtime_bootstrap_example.cpp \
            -o dist/bin/config_runtime_example

          g++ -std=c++17 -O2 -I. \
            src/config/config_runtime.cpp \
            src/ui/settings/settings_flow.cpp \
            src/ui/settings/settings_flow_example.cpp \
            -o dist/bin/settings_flow_example

          g++ -std=c++17 -O2 -I. \
            src/config/config_runtime.cpp \
            src/ui/home/home_shell.cpp \
            src/ui/home/home_shell_example.cpp \
            -o dist/bin/home_shell_example

          g++ -std=c++17 -O2 -pthread -I. \
            src/lyrics/lyrics_resolver.cpp \
            src/lyrics/lyrics_resolver_example.cpp \
            -o dist/bin/lyrics_resolver_example

          g++ -std=c++17 -O2 -I. \
            src/playback/playback_queue.cpp \
            src/platform/android/media_key_controller.cpp \
            src/platform/android/media_key_controller_example.cpp \
            -o dist/bin/media_key_controller_example

          g++ -std=c++17 -O2 -I. \
            src/platform/android/audio_focus_manager.cpp \
            src/platform/android/audio_focus_manager_example.cpp \
            -o dist/bin/audio_focus_manager_example

          g++ -std=c++17 -O2 -pthread -I. \
            src/config/config_runtime.cpp \
            src/ui/settings/settings_flow.cpp \
            src/ui/home/home_shell.cpp \
            src/lyrics/lyrics_resolver.cpp \
            src/playback/playback_queue.cpp \
            src/platform/android/media_key_controller.cpp \
            src/platform/android/audio_focus_manager.cpp \
            src/app/mvp_app.cpp \
            -o dist/bin/skoda_music_mvp_app

          g++ -std=c++17 -O2 -pthread -I. \
            src/config/config_runtime.cpp \
            src/ui/settings/settings_flow.cpp \
            src/ui/home/home_shell.cpp \
            src/lyrics/lyrics_resolver.cpp \
            src/playback/playback_queue.cpp \
            src/platform/android/media_key_controller.cpp \
            src/platform/android/audio_focus_manager.cpp \
            src/app/qml_frontend_bridge.cpp \
            src/app/qml_frontend_bridge_example.cpp \
            -o dist/bin/qml_frontend_bridge_example

      - name: Smoke test MVP app
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "status"
            echo "home"
            echo "queue"
            echo "lyrics"
            echo "focus fg"
            echo "focus gain"
            echo "next"
            echo "settings-test"
            echo "quit"
          } | dist/bin/skoda_music_mvp_app > dist/bin/mvp_app_smoke.txt

      - name: Smoke test QML bridge shell
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "status"
            echo "nav queue"
            echo "next"
            echo "test"
            echo "lyrics"
            echo "focus gain"
            echo "quit"
          } | dist/bin/qml_frontend_bridge_example > dist/bin/qml_bridge_smoke.txt

      - name: Build package bundle
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/package
          cp -r docs dist/package/docs
          cp -r config dist/package/config
          cp -r src dist/package/src
          cp PROJECT_BRIEF.md PLAN.md CURRENT_STATUS.md NEXT_STEPS.md HANDOFF.md dist/package/
          tar -czf dist/skoda-music-mvp.tar.gz -C dist/package .

      - name: Build unsigned APK/AAB placeholders
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/release/apk dist/release/aab
          cp dist/skoda-music-mvp.tar.gz dist/release/apk/payload.tar.gz
          cp dist/skoda-music-mvp.tar.gz dist/release/aab/payload.tar.gz
          cp -r dist/bin dist/release/apk/bin
          cp -r dist/bin dist/release/aab/bin
          (
            cd dist/release/apk
            zip -q -r ../skoda-music-mvp-unsigned.apk .
          )
          (
            cd dist/release/aab
            zip -q -r ../skoda-music-mvp-unsigned.aab .
          )

      - name: Restore Android keystore
        if: env.HAS_SIGNING_SECRETS == 'true'
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/keystore"
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/keystore/release.jks"

      - name: Sign APK and AAB
        if: env.HAS_SIGNING_SECRETS == 'true'
        shell: bash
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          KEYSTORE="$RUNNER_TEMP/keystore/release.jks"
          jarsigner -verbose \
            -sigalg SHA256withRSA \
            -digestalg SHA-256 \
            -keystore "$KEYSTORE" \
            -storepass "$ANDROID_KEYSTORE_PASSWORD" \
            -keypass "$ANDROID_KEY_PASSWORD" \
            -signedjar dist/release/skoda-music-mvp-signed.apk \
            dist/release/skoda-music-mvp-unsigned.apk \
            "$ANDROID_KEY_ALIAS"
          jarsigner -verify -verbose -certs dist/release/skoda-music-mvp-signed.apk

          jarsigner -verbose \
            -sigalg SHA256withRSA \
            -digestalg SHA-256 \
            -keystore "$KEYSTORE" \
            -storepass "$ANDROID_KEYSTORE_PASSWORD" \
            -keypass "$ANDROID_KEY_PASSWORD" \
            -signedjar dist/release/skoda-music-mvp-signed.aab \
            dist/release/skoda-music-mvp-unsigned.aab \
            "$ANDROID_KEY_ALIAS"
          jarsigner -verify -verbose -certs dist/release/skoda-music-mvp-signed.aab

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.publish_release)
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG_NAME="${GITHUB_REF_NAME}"
          if [[ "${GITHUB_REF_TYPE}" != "tag" ]]; then
            TAG_NAME="mvp-r${GITHUB_RUN_NUMBER}"
          fi

          APK_ASSET="dist/release/skoda-music-mvp-unsigned.apk"
          AAB_ASSET="dist/release/skoda-music-mvp-unsigned.aab"
          if [[ -f "dist/release/skoda-music-mvp-signed.apk" ]]; then
            APK_ASSET="dist/release/skoda-music-mvp-signed.apk"
          fi
          if [[ -f "dist/release/skoda-music-mvp-signed.aab" ]]; then
            AAB_ASSET="dist/release/skoda-music-mvp-signed.aab"
          fi

          NOTES="Automated release from ${GITHUB_SHA}"
          if gh release view "${TAG_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${TAG_NAME}" \
              "${APK_ASSET}" \
              "${AAB_ASSET}" \
              --repo "${GITHUB_REPOSITORY}" \
              --clobber
          else
            gh release create "${TAG_NAME}" \
              "${APK_ASSET}" \
              "${AAB_ASSET}" \
              --repo "${GITHUB_REPOSITORY}" \
              --target "${GITHUB_SHA}" \
              --title "${TAG_NAME}" \
              --notes "${NOTES}"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: skoda-music-mvp
          path: |
            dist/bin
            dist/skoda-music-mvp.tar.gz
            dist/release
